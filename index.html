<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Discothèque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

        <main>
