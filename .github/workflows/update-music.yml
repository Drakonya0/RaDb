name: Mise à jour hebdomadaire

on:
  schedule:
    - cron: '0 1 * * 5'
  workflow_dispatch:
  push:
    paths:
      - 'artists.txt'

jobs:
  update-music-data:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Test simple
      run: |
        echo "📋 Liste des fichiers :"
        ls -la
        echo ""
        echo "📝 Contenu de artists.txt :"
        cat artists.txt || echo "artists.txt non trouvé"
        echo ""
        echo "✅ Test réussi"
